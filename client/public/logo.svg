<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" fill="none">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="40%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8941E"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#0D5E57"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Icon badge -->
  <rect x="8" y="8" width="144" height="144" rx="32" fill="url(#bgGrad)"/>
  <rect x="10" y="10" width="140" height="140" rx="30" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.3"/>

  <!-- ز letter in icon -->
  <g filter="url(#shadow)">
    <path d="M 50 44 
             Q 70 42, 100 44 
             Q 110 45, 108 58 
             Q 104 80, 93 94 
             Q 83 106, 78 120 
             Q 76 128, 78 135"
          fill="none" stroke="url(#goldH)" stroke-width="14" stroke-linecap="round"/>
  </g>
  <!-- Nuqta -->
  <circle cx="74" cy="145" r="5" fill="url(#gold)" filter="url(#shadow)"/>

  <!-- Title: Sheikh Muhammed Zabuur -->
  <text x="175" y="62" font-family="'Poppins', sans-serif" font-weight="700" font-size="30" fill="white" dominant-baseline="central" letter-spacing="-0.3">Sheikh Muhammed</text>
  <text x="175" y="100" font-family="'Poppins', sans-serif" font-weight="700" font-size="30" fill="url(#goldH)" dominant-baseline="central" letter-spacing="-0.3">Zabuur</text>

  <!-- Subtitle: Iman Chercher College -->
  <text x="175" y="128" font-family="'Poppins', sans-serif" font-weight="600" font-size="13" fill="rgba(255,255,255,0.5)" dominant-baseline="central" letter-spacing="3">IMAN CHERCHER COLLEGE</text>

  <!-- Decorative divider -->
  <line x1="175" y1="113" x2="480" y2="113" stroke="url(#goldH)" stroke-width="1" opacity="0.2"/>
</svg>

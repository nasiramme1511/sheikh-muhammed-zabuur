<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 140" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&amp;display=swap');
      .icc-title { font-family: 'Poppins', sans-serif; font-weight: 800; }
      .icc-sub { font-family: 'Poppins', sans-serif; font-weight: 600; letter-spacing: 0.15em; }
    </style>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="50%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background shield/badge shape -->
  <rect x="8" y="8" width="90" height="124" rx="18" fill="url(#g4)" stroke="url(#g3)" stroke-width="1.5"/>
  <rect x="12" y="12" width="82" height="116" rx="15" fill="url(#g4)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- Glow behind icon -->
  <circle cx="53" cy="58" r="40" fill="#10B981" opacity="0.08" filter="url(#glow)"/>

  <!-- Open Book silhouette -->
  <path d="M24,90 L24,42 Q53,24 82,42 L82,90 Q53,74 24,90Z" fill="url(#g1)" opacity="0.25"/>
  <path d="M28,86 L28,46 Q53,30 78,46 L78,86 Q53,70 28,86Z" fill="url(#g1)" opacity="0.45"/>
  <path d="M32,82 L32,50 Q53,36 74,50 L74,82 Q53,66 32,82Z" fill="url(#g1)" opacity="0.65"/>
  <!-- Center spine line -->
  <line x1="53" y1="28" x2="53" y2="94" stroke="url(#g2)" stroke-width="2" opacity="0.6"/>

  <!-- Dome arch over the book -->
  <path d="M28,48 Q53,14 78,48" fill="none" stroke="url(#g2)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M33,48 Q53,20 73,48" fill="none" stroke="url(#g2)" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Left Minaret -->
  <rect x="16" y="38" width="3.5" height="58" rx="1.75" fill="url(#g2)"/>
  <rect x="14.5" y="34" width="6.5" height="6" rx="3" fill="url(#g2)"/>
  <circle cx="17.75" cy="30" r="3.5" fill="url(#g2)" filter="url(#glow)"/>

  <!-- Right Minaret -->
  <rect x="86.5" y="38" width="3.5" height="58" rx="1.75" fill="url(#g2)"/>
  <rect x="85" y="34" width="6.5" height="6" rx="3" fill="url(#g2)"/>
  <circle cx="88.25" cy="30" r="3.5" fill="url(#g2)" filter="url(#glow)"/>

  <!-- Crescent Moon and Star -->
  <g transform="translate(53, 16)" filter="url(#glow)">
    <path d="M-6,0 A7,7 0 1,1 6,0 A5,5 0 1,0 -6,0Z" fill="url(#g2)"/>
    <circle cx="10" cy="-8" r="2" fill="url(#g2)"/>
    <circle cx="13" cy="-3" r="1.2" fill="url(#g2)"/>
    <circle cx="8" cy="-14" r="1" fill="url(#g2)" opacity="0.6"/>
  </g>

  <!-- Decorative geometric pattern below icon -->
  <g transform="translate(53, 106)" opacity="0.4">
    <polygon points="0,-8 7,-3 4,5 -4,5 -7,-3" fill="url(#g2)"/>
  </g>

  <!-- Text: Sheikh Mohammed Zabuur Iman Chercher College -->
  <text x="115" y="58" class="icc-title" font-size="34" fill="white" dominant-baseline="central">Sheikh Mohammed</text>
  <text x="115" y="92" class="icc-sub" font-size="14" fill="rgba(255,255,255,0.5)" dominant-baseline="central">IMAN CHERCHER COLLEGE</text>

  <!-- Decorative line under text -->
  <line x1="115" y1="102" x2="380" y2="102" stroke="url(#g3)" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- ICC monogram at right -->
  <text x="395" y="82" class="icc-title" font-size="52" fill="url(#g1)" dominant-baseline="central" opacity="0.15">ICC</text>
</svg>
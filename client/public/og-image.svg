<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="60%" stop-color="#0D5E57"/>
      <stop offset="100%" stop-color="#0A4D47"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="40%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8941E"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative pattern -->
  <g opacity="0.03" fill="none" stroke="white" stroke-width="1.5">
    <polygon points="600,100 680,230 820,230 710,320 740,460 600,370 460,460 490,320 380,230 520,230"/>
    <polygon points="600,50 660,150 770,150 690,220 715,330 600,260 485,330 510,220 430,150 540,150"/>
  </g>
  <!-- Large ز letter (decorative background) -->
  <g opacity="0.06" fill="none" stroke="white" stroke-width="20" stroke-linecap="round">
    <path d="M 800 180 Q 850 175, 950 178 Q 970 180, 965 200 Q 955 240, 930 270 Q 910 295, 900 325 Q 895 340, 898 355"/>
    <circle cx="890" cy="380" r="8"/>
  </g>
  <!-- Main ز icon -->
  <rect x="60" y="140" width="260" height="260" rx="60" fill="rgba(255,255,255,0.05)"/>
  <rect x="64" y="144" width="252" height="252" rx="56" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.3"/>
  <g filter="url(#glow)">
    <path d="M 120 190 Q 140 185, 190 188 Q 220 190, 230 200 Q 240 215, 235 235 Q 225 255, 215 270 Q 205 282, 198 300 Q 195 310, 198 325" fill="none" stroke="url(#goldV)" stroke-width="32" stroke-linecap="round"/>
  </g>
  <circle cx="192" cy="350" r="12" fill="url(#gold)" filter="url(#glow)"/>
  <!-- Brand name -->
  <text x="360" y="235" font-family="'Poppins', sans-serif" font-weight="800" font-size="52" fill="white" letter-spacing="-1">Sheikh Muhammed</text>
  <text x="360" y="305" font-family="'Poppins', sans-serif" font-weight="800" font-size="52" fill="url(#gold)" letter-spacing="-1">Zabuur</text>
  <text x="360" y="360" font-family="'Poppins', sans-serif" font-weight="600" font-size="20" fill="rgba(255,255,255,0.6)" letter-spacing="4">IMAN CHERCHER COLLEGE</text>
  <line x1="360" y1="390" x2="750" y2="390" stroke="url(#gold)" stroke-width="2" opacity="0.3"/>
  <text x="360" y="430" font-family="'Poppins', sans-serif" font-weight="400" font-size="18" fill="rgba(255,255,255,0.4)" letter-spacing="0.5">Authentic Islamic Education — Audio, Video &amp; PDF</text>
  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.15)"/>
  <text x="600" y="608" font-family="'Poppins', sans-serif" font-weight="500" font-size="14" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="2">SHEIKHMOHAMMEDZABUUR.COM</text>
</svg>

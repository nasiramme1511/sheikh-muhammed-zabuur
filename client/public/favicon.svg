<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#0D5E57"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="40%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8941E"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  <rect x="12" y="12" width="488" height="488" rx="84" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.4"/>
  <rect x="20" y="20" width="472" height="472" rx="76" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.2"/>
  <!-- Subtle geometric star pattern -->
  <g opacity="0.05" fill="none" stroke="white" stroke-width="1">
    <polygon points="256,80 300,180 400,180 320,260 350,360 256,290 162,360 192,260 112,180 212,180"/>
  </g>
  <!-- Glow behind letter -->
  <circle cx="256" cy="240" r="140" fill="#D4AF37" opacity="0.08" filter="url(#glow)"/>
  <!-- Arabic letter ز (Zay) -->
  <g filter="url(#shadow)">
    <path d="M 170 150 
             Q 240 145, 340 148 
             Q 365 150, 360 180 
             Q 350 235, 315 275 
             Q 285 310, 270 355 
             Q 264 375, 268 395"
          fill="none" stroke="url(#gold2)" stroke-width="36" stroke-linecap="round"/>
  </g>
  <!-- Nuqta (dot) of ز -->
  <circle cx="254" cy="435" r="13" fill="url(#gold)" filter="url(#shadow)"/>
  <!-- Open book motif below -->
  <g transform="translate(256, 458)" opacity="0.85">
    <path d="M -28 0 L -28 -8 Q 0 -22 28 -8 L 28 0 Q 0 -12 -28 0Z" fill="url(#gold2)"/>
    <path d="M -32 3 L -32 -5 Q 0 -18 32 -5 L 32 3 Q 0 -9 -32 3Z" fill="url(#gold)" opacity="0.5"/>
    <line x1="0" y1="-18" x2="0" y2="4" stroke="#0F766E" stroke-width="2.5" opacity="0.6"/>
  </g>
</svg>

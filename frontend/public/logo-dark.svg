<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 180" fill="none">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="40%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8941E"/>
    </linearGradient>
    <linearGradient id="bgBadge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#064E4A"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <style>
      <![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@700&family=Poppins:wght@400;600;700;800&display=swap');
      .ar { font-family: 'Noto Kufi Arabic', 'Traditional Arabic', sans-serif; font-weight: 700; }
      .en-title { font-family: 'Poppins', system-ui, sans-serif; font-weight: 800; }
      .en-tag { font-family: 'Poppins', system-ui, sans-serif; font-weight: 400; }
      ]]>
    </style>
  </defs>
  <g filter="url(#shadow)">
    <circle cx="90" cy="90" r="62" fill="url(#bgBadge)" stroke="url(#gold)" stroke-width="2"/>
    <circle cx="90" cy="90" r="54" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.3"/>
    <path d="M 48 92 Q 90 80, 128 92 C 138 94, 140 102, 135 112 Q 125 132, 104 142 Q 96 146, 88 148"
          fill="none" stroke="url(#gold)" stroke-width="10" stroke-linecap="round"/>
    <path d="M 88 148 Q 78 162, 66 166"
          fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M 88 148 Q 98 162, 112 164"
          fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <polygon points="76,58 91,71 76,84 61,71" fill="url(#gold)"/>
    <polygon points="76,63 86,71 76,79 66,71" fill="#064E4A"/>
  </g>
  <text x="180" y="62" class="ar" font-size="22" fill="url(#gold)" dominant-baseline="central">الشيخ محمد زبور</text>
  <text x="180" y="102" class="en-title" font-size="30" fill="#FFFFFF" dominant-baseline="central" letter-spacing="-0.5">Sheikh Mohammed Zabuur</text>
  <line x1="180" y1="125" x2="400" y2="125" stroke="url(#gold)" stroke-width="1.5" opacity="0.3"/>
  <text x="180" y="148" class="en-tag" font-size="14" fill="rgba(255,255,255,0.45)" dominant-baseline="central" letter-spacing="4">AUTHENTIC ISLAMIC LESSONS</text>
</svg>
